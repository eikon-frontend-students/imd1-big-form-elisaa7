<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>formulaire</title>
    <link rel="stylesheet" href="styles.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Radio+Canada:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Фонова анімація: падаючі шоколадні зображення, щоб створити атмосферу -->
    <div class="chocolate-rain">
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
      <img src="photo/choco.png" alt="" />
    </div>
    <!-- Основний контейнер сторінки: бокова картинка та форма бронювання -->
    <div class="page-formulaire">
      <!-- Ліва частина сторінки: фонове фото і логотип -->
      <div class="left-side">
        <img
          class="background-image"
          src="photo/chocolate.jpg"
          alt="chocolate"
        />

        <img class="logo" src="photo/Cailler_logo.png" alt="logo" />
      </div>

      <!-- Права частина сторінки: блок форми з полями для введення -->
      <div class="right-side">
        <div class="formulaire">
          <h1>Découvrez la chocolaterie Cailler</h1>
          <p>La visite est gratuite, sur réservation uniquement</p>
          <!-- Блок з персональною інформацією: ім'я, прізвище, e-mail, телефон -->
          <div class="personal-info">
            <div>
              <label>Prénom</label>
              <input type="text" placeholder="Entrez votre Prénom" />
            </div>
            <div>
              <label>Nom</label>
              <input type="text" placeholder="Entrez votre nom" />
            </div>

            <div>
              <label>Adresse e-mail</label>

              <input type="text" placeholder="Entrez votre e-mail" />
            </div>
            <div>
              <label>Numéro de téléphone</label>
              <input type="text" placeholder="Entrez votre téléphone" />
            </div>
          </div>

          <!-- Блок вибору типу відвідування: радіокнопки для одного з трьох варіантів -->
          <div class="part_two">
            <div class="visit-group">
              <h2>Type de visite</h2>

              <div class="visit-option">
                <input type="radio" id="visite1" name="visite" />
                <label for="visite1"> Visite guidée classique </label>
              </div>

              <div class="visit-option">
                <input type="radio" id="visite2" name="visite" />
                <label for="visite2"> Atelier de fabrication </label>
              </div>

              <div class="visit-option">
                <input type="radio" id="visite3" name="visite" />
                <label for="visite3"> Dégustation premium </label>
              </div>
            </div>
            <!-- Блок вибору кількості учасників: кнопки мінус і плюс, поле введення і повідомлення про максимум -->
            <div class="participants-block">
              <h2>Nombre de participants</h2>

              <div class="participants">
                <div class="who">
                  <label>Adultes</label>
                  <div class="number-chooser">
                    <button data-minus>-</button>
                    <input type="number" name="adults" />
                    <button data-plus>+</button>
                  </div>
                </div>

                <div class="who">
                  <label>Enfants</label>
                  <div class="number-chooser">
                    <button data-minus>-</button>
                    <input type="number" name="children" />
                    <button data-plus>+</button>
                  </div>
                </div>

                <div class="who">
                  <label>Étudiants</label>
                  <div class="number-chooser">
                    <button data-minus>-</button>
                    <input type="number" name="students" />
                    <button data-plus>+</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Блок вибору дати відвідування між типом відвідування та алергіями -->
          <div class="visit-date">
            <h2>Date de visite</h2>
            <input type="date" name="date-visite" />
          </div>

          <!-- Блок для додаткової інформації: вказати алергії чи інші важливі дані -->
          <div class="personal-Allergies">
            <div>
              <h2>Allergies <span class="optional-text">(optionel)</span></h2>
              <input type="text" placeholder="Entrez votre allergie" />
            </div>
          </div>
          <!-- Блок з чекбоксами для згоди з умовами та підписки на розсилку -->
          <div class="checkbox">
            <input class="check" type="checkbox" />

            <label> J’accepte les conditions générales </label>
            <input class="check" type="checkbox" />
            <label> Recevoir la newsletter </label>
          </div>

          <!-- Кнопка для підтвердження бронювання відвідування -->
          <a href="réussi.html" class="reserver">Réserver ma visite</a>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
